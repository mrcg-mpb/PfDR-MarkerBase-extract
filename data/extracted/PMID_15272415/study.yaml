study_id: PMID_15272415
study_label: Kidal epidemic drug resistance markers, Mali 1999
description: Cross-sectional survey during a 1999 P. falciparum malaria epidemic in
  Kidal district, northern Mali. Measured molecular markers of resistance to chloroquine
  (pfcrt K76T) and sulfadoxine-pyrimethamine (dhfr/dhps) in 5 nomadic camps under
  military escort.
access_level: public
contributors: Djimde AA, Dolo A, Ouattara A, Diakite S, Plowe CV, Doumbo OK
reference: Djimde AA, et al. Molecular Diagnosis of Resistance to Antimalarial Drugs
  during Epidemics and in War Zones. J Infect Dis 2004;190:853-855.
reference_year: 2004
