study_id: PMID_30898164
study_label: Ishengoma et al. 2019 - Artemether-lumefantrine TES Tanzania
description: Therapeutic efficacy study of artemether-lumefantrine (AL) for uncomplicated
  P. falciparum malaria and prevalence of Pfk13 and Pfmdr1 polymorphisms conducted
  at four sentinel sites in mainland Tanzania (Kibaha, Mkuzi, Mlimba, Ujiji) between
  April and October 2016. 344 patients aged 6 months to 10 years enrolled; high AL
  efficacy (PCR-corrected ACPR >98%) observed despite high prevalence of Pfmdr1 NFD
  haplotype (39.0%). No known artemisinin-resistance Pfk13 mutations detected.
access_level: public
contributors: Deus S. Ishengoma, Celine I. Mandara, Filbert Francis, and co-authors;
  Centers for Disease Control and Prevention (CDC), National Institute for Medical
  Research (NIMR), National Malaria Control Programme (NMCP) Tanzania
reference: Ishengoma DS, Mandara CI, Francis F, et al. Efficacy and safety of artemether-lumefantrine
  for the treatment of uncomplicated malaria and prevalence of Pfk13 and Pfmdr1 polymorphisms
  after a decade of using artemisinin-based combination therapy in mainland Tanzania.
  Malaria Journal. 2019;18:88.
reference_year: 2019
