study_id: PMID_16186171
study_label: Evans et al. 2005 - CQ pre-treatment and pfcrt resistance in Ghanaian
  children
description: 'Prospective clinical study of 189 children with severe malaria at Komfo
  Anokye Teaching Hospital, Kumasi, Ghana (Nov 2000-Feb 2001). Pfcrt codon 76 genotyped
  in 139 patients by PCR/restriction digest: 122 T76 (mutant) / 17 K76 (wild type).
  No mixed genotypes were observed.'
access_level: public
contributors: J.A. Evans, J. May, D. Tominski, T. Eggelte, F. Marks, H.H. Abruquah,
  C.G. Meyer, C. Timmann, T. Agbenyega, R.D. Horstmann
reference: Evans JA, May J, Tominski D, et al. Pre-treatment with chloroquine and
  parasite chloroquine resistance in Ghanaian children with severe malaria. Q J Med
  2005; 98:789-796.
reference_year: 2005
