study_id: PMID_11865433
study_label: pfcrt K76T mapping in Madagascar and Comoro Islands
description: 'Correspondence letter reporting pfcrt K76T mutation frequencies in P.
  falciparum isolates from Madagascar and the Comoro Islands, collected via the RER
  surveillance network. Table 1 gives counts of K76T presence/absence: Madagascar
  random group (0/40), Madagascar IC50>=100nM group (0/24), Madagascar Mahajanga region
  (0/19), and Comoro Islands Moroni/Grande Comore region (33/49). Text also notes
  62% (30/48) of Comoro isolates harbored K76T, differing slightly from Table 1''s
  33/49.'
access_level: public
contributors: F. Ariey, M. Randrianarivelojosia, J. B. Duchemin, D. Rakotondramarina,
  A. Ouledi, V. Robert, R. Jambou, M. Jahevitra, H. Andrianantenaina, L. Raharimalala,
  P. Mauclere
reference: 'Ariey F, et al. Mapping of a Plasmodium falciparum pfcrt K76T Mutation:
  A Useful Strategy for Controlling Chloroquine Resistance in Madagascar. J Infect
  Dis 2002;185:710-2.'
reference_year: 2002
