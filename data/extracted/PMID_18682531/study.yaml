study_id: PMID_18682531
study_label: Niang et al. 2008 - CVIET Pfcrt in placenta of pregnant women, Dakar
description: 'Study of Pfcrt exon 2 (codons 72-76) polymorphism in matched placental
  and venous blood from pregnant women in Guediawaye, a suburb of Dakar, Senegal,
  collected 2000-2001. Full sequence obtained for 141 samples (72 peripheral venous,
  69 placenta). Only two haplotypes found: CVMNK and CVIET. Codons 74, 75, 76 are
  target positions; codon 72 (C) and 73 wild-type. The paper explicitly states all
  other exon 2 codons were identical to strain 3D7.'
access_level: public
contributors: Niang M, Marrama L, Ekala MT, Alioune G, Tall A, Ndiaye JL, Sarr D,
  Dangou JM, Lehesran JY, Bouchier C, Mercereau-Puijalon O, Jambou R
reference: 'Niang M et al. Accumulation of CVIET Pfcrt allele of Plasmodium falciparum
  in placenta of pregnant women living in an urban area of Dakar, Senegal. J Antimicrob
  Chemother 2008; 62: 921-928.'
reference_year: 2008
