study_id: PMID_19708897
study_label: Uige Angola drug resistance 2004
description: Molecular monitoring of P. falciparum drug-resistance markers (pfcrt,
  pfmdr1, pfdhfr, pfdhps, pfATPase6) in 71 (66 fully characterized) blood samples
  from children at Uige Provincial Hospital, Angola, collected July-August 2004. Includes
  microsatellite analysis of pfdhfr flanking regions.
access_level: public
contributors: Menegon M, Pearce RJ, Inojosa WO, Pisani V, Abel PM, Matondo A, Bisoffi
  Z, Majori G, Ord R, Warhurst DC, Roper C, Severini C
reference: Menegon M et al. Monitoring for multidrug-resistant Plasmodium falciparum
  isolates and analysis of pyrimethamine resistance evolution in Uige province, Angola.
  Trop Med Int Health. 2009;14(10):1251-1257.
reference_year: 2009
