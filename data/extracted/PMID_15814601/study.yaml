study_id: PMID_15814601
study_label: pfcrt K76T in pregnant women taking chloroquine prophylaxis, Thiadiaye,
  Senegal
description: Study comparing prevalence of pfcrt K76T mutation in P. falciparum isolates
  from infected pregnant women (mid-pregnancy and at delivery, peripheral and placental
  blood) versus non-pregnant asymptomatic controls in Thiadiaye, Senegal. Genotyping
  by PCR-RFLP with ApoI.
access_level: public
contributors: Bertin G, Tuikue Ndam N, Jafari-Guemouri S, Fievet N, Renart E, Sow
  S, Le Hesran JY, Deloron P
reference: Bertin G, et al. High prevalence of Plasmodium falciparum pfcrt K76T mutation
  in pregnant women taking chloroquine prophylaxis in Senegal. J Antimicrob Chemother.
  2005;55(5):788-791.
reference_year: 2005
