study_id: PMID_10950805
study_label: Doumbo et al. 2000 - Pyrimethamine selection of DHFR mutants, Mali
description: Prospective study of weekly pyrimethamine prophylaxis on P. falciparum
  DHFR genotypes in a rural Malian village (Tieneguebougou), 1996 rainy season. Baseline
  village-wide survey (n=119) and breakthrough infections (n=52) analyzed by PCR for
  DHFR mutations at codons 51, 59, 108. DHPS 436/437 detected but no quantitative
  counts given.
access_level: public
contributors: Doumbo OK, Kayentao K, Djimde A, Cortese JF, Diourte Y, Konare A, Kublin
  JG, Plowe CV
reference: Doumbo OK, et al. Rapid Selection of Plasmodium falciparum Dihydrofolate
  Reductase Mutants by Pyrimethamine Prophylaxis. J Infect Dis 2000;182:993-6
reference_year: 2000
