study_id: PMID_19841150
study_label: Karema et al. 2010 Rwanda antifolate resistance
description: Molecular study correlating pfdhfr and pfdhps mutations with antifolate
  treatment efficacy in Rwandan children with uncomplicated P. falciparum malaria
  at two sites (Rukara, eastern; Mashesha/Muganza, western) during a 2006 drug trial
  (NCT00461578). 725 isolates genotyped at enrollment.
access_level: public
contributors: Corine Karema, Mallika Imwong, Caterina I. Fanello, Kasia Stepniewska,
  Aline Uwimana, Supatchara Nakeesathit, Arjen Dondorp, Nicholas P. Day, Nicholas
  J. White
reference: Karema C, et al. Molecular Correlates of High-Level Antifolate Resistance
  in Rwandan Children with Plasmodium falciparum Malaria. Antimicrob Agents Chemother.
  2010;54(1):477-483.
reference_year: 2010
