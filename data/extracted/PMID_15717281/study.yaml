study_label: Sisowath et al. 2005 - pfmdr1 86N selection by artemether-lumefantrine,
  Zanzibar
description: Artemether-lumefantrine (Coartem) follow-up clinical trial in 200 children
  with uncomplicated P. falciparum malaria in Kivunge (Unguja) and Micheweni (Pemba),
  Zanzibar, Oct 2002-Feb 2003. pfcrt K76T and pfmdr1 N86Y frequencies determined before
  treatment (day 0) and in recurrent parasites during 42-day follow-up.
