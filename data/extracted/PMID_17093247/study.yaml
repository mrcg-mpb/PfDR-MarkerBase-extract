study_id: PMID_17093247
study_label: Chloroquine efficacy Malawi 2005
description: Randomized clinical trial in Blantyre (Ndirande), Malawi comparing chloroquine
  vs sulfadoxine-pyrimethamine in 210 children with uncomplicated P. falciparum malaria.
  PfCRT K76T molecular marker assayed at enrollment; all 199 successfully typed samples
  were wild-type K76.
access_level: public
contributors: Laufer MK, Thesing PC, Eddington ND, Masonga R, Dzinjalamala FK, Takala
  SL, Taylor TE, Plowe CV
reference: Laufer MK, et al. Return of Chloroquine Antimalarial Efficacy in Malawi.
  N Engl J Med 2006;355:1959-66.
reference_year: 2006
PMID: '17093247'
