study_id: PMID_11679122
study_label: Eberl et al. 2001 Mauritania DHFR/DHPS
description: Prevalence of DHFR (codons 51, 59, 108) and DHPS (codons 436, 437, 540,
  581, 613) polymorphisms in P. falciparum isolates from febrile patients at two health
  centres (Aioun and Kobeni) in Hodh El Gharbi, south-east Mauritania, collected in
  1998 during an in vivo chloroquine resistance study. Analysis by nested PCR and
  mutation-specific RFLP.
access_level: public
contributors: K. J. Eberl, T. Jelinek, A. O. Aida, G. Peyerl-Hoffmann, C. Heuschkel,
  A. O. el Valy, E. M. Christophel
reference: Eberl KJ, Jelinek T, Aida AO, et al. Prevalence of polymorphisms in the
  dihydrofolate reductase and dihydropteroate synthetase genes of Plasmodium falciparum
  isolates from southern Mauritania. Tropical Medicine and International Health 2001;6(10):756-760.
reference_year: 2001
