study_id: PMID_11294677
study_label: pfcrt/pfmdr-1 and chloroquine response, Kampala Uganda
description: Study of pfcrt and pfmdr-1 polymorphisms and in vivo chloroquine response
  in P. falciparum isolates from Kampala, Uganda (Aug 1998-Mar 1999). K76T present
  in 100% of 114 pre-treatment isolates; case-control subset of 30 samples genotyped
  at 8 pfcrt and 2 pfmdr-1 sites.
