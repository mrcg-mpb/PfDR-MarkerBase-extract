study_id: PMID_16703518
study_label: SVMNT haplotype in Tanzania
description: Cross-sectional surveys in Korogwe District, Tanzania (2003 and 2004)
  genotyping Pfcrt codon 72-76 haplotypes (CVMNK, CVIET, SVMNT) in P. falciparum-positive
  children/adolescents, using nested PCR followed by SSOP ELISA. First documentation
  of SVMNT haplotype in Africa.
access_level: public
contributors: Alifrangis M, Dalgaard MB, Lusingu JP, Vestergaard LS, Staalsoe T, Jensen
  ATR, Enevold A, Ronn AM, Khalil IF, Warhurst DC, Lemnge MM, Theander TG, Bygbjerg
  IC
reference: Alifrangis M, et al. Occurrence of the Southeast Asian/South American SVMNT
  Haplotype of the Chloroquine-Resistance Transporter Gene in Plasmodium falciparum
  in Tanzania. J Infect Dis 2006;193:1738-41
reference_year: 2006
PMID: '16703518'
