study_id: PMID_9391510
study_label: Jelinek et al. (1997) Tanzania DHFR mutations
description: A therapeutic trial investigating DHFR mutations in P. falciparum isolates
  from Tanzanian children treated with sulfadoxine/pyrimethamine. 44 children aged
  1-10 years from Magoda village, Tanga region were enrolled. Blood samples taken
  before treatment and at days 1, 2, 3, 7. DNA extracted and nested PCR with restriction
  enzyme digestion used to detect mutations at DHFR codons 16, 51, 59, 108, and 164.
  All 44 samples harboured mutations at codons 51, 59, or 108. No relationship found
  between DHFR mutations and clinical drug resistance (parasitaemia at day 7).
access_level: public
contributors: Jelinek T, Rønn AM, Curtis J, Duraisingh MT, Lemnge MM, Mhina J, Bygbjerg
  IC, Warhurst DC
reference: Jelinek T, Rønn AM, Curtis J, Duraisingh MT, Lemnge MM, Mhina J, Bygbjerg
  IC, Warhurst DC. High prevalence of mutations in the dihydrofolate reductase gene
  of Plasmodium falciparum in isolates from Tanzania without evidence of an association
  to clinical sulfadoxine/pyrimethamine resistance. Tropical Medicine and International
  Health. 1997;2(11):1075-1079.
