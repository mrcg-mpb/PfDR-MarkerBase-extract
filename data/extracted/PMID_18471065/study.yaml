study_id: PMID_18471065
study_label: Lynch 2008 SW Uganda dhfr I164L
description: Field study reporting dhfr and dhps point mutation frequencies among
  symptomatic P. falciparum malaria patients at reference health facilities in Bufundi
  (Kabale District) and Kebisoni (Rukungiri District), southwest Uganda, collected
  May-December 2005 as part of the Highland Malaria Project (HIMAL). Reports emergence
  of the dhfr I164L high-level resistance mutation.
access_level: public
contributors: Caroline Lynch, Richard Pearce, Hirva Pota, Jonathan Cox, Tarekegn A.
  Abeku, John Rwakimari, Inbarani Naidoo, James Tibenderana, Cally Roper
reference: Lynch C, et al. Emergence of a dhfr Mutation Conferring High-Level Drug
  Resistance in Plasmodium falciparum Populations from Southwest Uganda. J Infect
  Dis 2008;197:1598-604.
reference_year: 2008
PMID: '18471065'
