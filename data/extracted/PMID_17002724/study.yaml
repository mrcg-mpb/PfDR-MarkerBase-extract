study_id: PMID_17002724
study_label: AS+AQ vs AS+SP efficacy trial, Shabunda, DRC
description: Clinical trial of artesunate+amodiaquine vs artesunate+sulphadoxine-pyrimethamine
  in 180 children (6-59 months) with uncomplicated P. falciparum malaria in Shabunda,
  South Kivu, DRC (April-May 2004). Day-0 samples genotyped by PCR-SSOP for dhfr (codons
  50,51,59,108) and dhps (codons 436,437,540) haplotypes.
access_level: public
contributors: Swarthout TD, van den Broek IV, Kayembe G, Montgomery J, Pota H, Roper
  C
reference: 'Swarthout TD, van den Broek IV, Kayembe G, Montgomery J, Pota H, Roper
  C. Artesunate + amodiaquine and artesunate + sulphadoxine-pyrimethamine for treatment
  of uncomplicated malaria in Democratic Republic of Congo: a clinical trial with
  determination of sulphadoxine and pyrimethamine-resistant haplotypes. Trop Med Int
  Health. 2006;11(10):1503-1511.'
reference_year: 2006
PMID: '17002724'
