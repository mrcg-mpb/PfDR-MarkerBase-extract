study_id: PMID_9391510
study_label: Jelinek et al. 1997 — DHFR mutations, Magoda, Tanzania
description: Therapeutic study of 44 P. falciparum-infected children in Magoda village,
  Tanga region, Tanzania (sampled 1995). PCR-RFLP genotyping of Pfdhfr codons 51,
  59, 108 before sulfadoxine/pyrimethamine treatment. No association found between
  DHFR mutations and day-7 clinical resistance.
access_level: public
contributors: T. Jelinek, A. M. Rønn, J. Curtis, M. T. Duraisingh, M. M. Lemnge, J.
  Mhina, I. C. Bygbjerg, D. C. Warhurst
reference: Jelinek T, Rønn AM, Curtis J, Duraisingh MT, Lemnge MM, Mhina J, Bygbjerg
  IC, Warhurst DC. High prevalence of mutations in the dihydrofolate reductase gene
  of Plasmodium falciparum in isolates from Tanzania without evidence of an association
  to clinical sulfadoxine/pyrimethamine resistance. Trop Med Int Health. 1997;2(11):1075-1079.
reference_year: 1997
