contributors: Ndounga M, Tahar R, Basco LK, Casimiro PN, Malonga DA, Ntoumi F
reference: Ndounga M, et al. Therapeutic efficacy of sulfadoxine-pyrimethamine and
  the prevalence of molecular markers of resistance in under 5-year olds in Brazzaville,
  Congo. Trop Med Int Health. 2007;12(10):1164-1171.
reference_year: 2007
