study_id: PMID_15679556
study_label: Depoortere et al. 2005, Maheba Zambia SP/AS
description: Randomized efficacy/effectiveness trial of sulfadoxine-pyrimethamine
  plus 3-day artesunate in children <5 years in the Maheba Refugee Settlement, Zambia
  (March-June 2002). All 113 day-0 PCR samples were analysed for dhfr codon 108 and
  dhps codon 437 mutations (Table 3).
access_level: public
contributors: Depoortere E, Guthmann JP, Presse J, Sipilanyambe N, Nkandu E, Balkan
  S, Eldin de Pecoulas P, Legros D
reference: Depoortere E, et al. Efficacy and effectiveness of the combination of sulfadoxine/pyrimethamine
  and a 3-day course of artesunate for the treatment of uncomplicated falciparum malaria
  in a refugee settlement in Zambia. Trop Med Int Health. 2005;10(2):139-145.
reference_year: 2005
