study_id: PMID_14728622
study_label: Kofoed et al. 2004 Guinea-Bissau dhfr/dhps
description: Cross-sectional study of dhfr (codons 51, 59, 108) and dhps (codons 436,
  437, 540) mutations in P. falciparum isolated from 100 children with acute malaria
  at Bandim Health Centre, Bissau, Guinea-Bissau (Jan-May 2001), compared with E.
  coli antifolate resistance. PCR-RFLP performed successfully on 97 blood samples.
access_level: public
contributors: Kofoed PE, Alfrangis M, Poulsen A, Rodrigues A, Gjedde SB, Rønn A, Rombo
  L
reference: Kofoed PE, Alfrangis M, Poulsen A, et al. Genetic markers of resistance
  to pyrimethamine and sulfonamides in Plasmodium falciparum parasites compared with
  the resistance patterns in isolates of Escherichia coli from the same children in
  Guinea-Bissau. Trop Med Int Health. 2004;9(1):171-177.
reference_year: 2004
