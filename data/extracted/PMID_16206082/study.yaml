study_id: PMID_16206082
study_label: Meerman et al. 2005, Farafenni severe malaria case-control
description: Matched case-control study of Gambian children with severe (cases) versus
  uncomplicated (controls) falciparum malaria in Farafenni, The Gambia (Sep-Dec 2002).
  Genotyped pfcrt 76, pfmdr1 86, and pfmdr1 184; reports resistance-allele prevalences
  in cases and controls.
access_level: public
contributors: Meerman L, Ord R, Bousema JT, van Niekerk M, Osman E, Hallett R, Pinder
  M, Walraven G, Sutherland CJ
reference: Meerman L, et al. Carriage of Chloroquine-Resistant Parasites and Delay
  of Effective Treatment Increase the Risk of Severe Malaria in Gambian Children.
  J Infect Dis 2005;192:1651-7.
reference_year: 2005
PMID: '16206082'
