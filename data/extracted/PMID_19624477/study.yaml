study_id: PMID_19624477
study_label: Bridges et al. 2009 — CQ resistance near Malawi northern border
description: Prevalence study of P. falciparum drug-resistance mutations (pfcrt K76T,
  dhfr N51I/C59R/S108N/I164L, dhps A437G/K540E) at Karonga (northern Malawi, near
  Tanzanian border) and Blantyre (southern Malawi), collected in 2007. Table 1 reports
  pfcrt mutant %, dhfr triple %, dhps double %, and dhfr/dhps quintuple %.
access_level: public
contributors: Daniel J. Bridges, Malcolm Molyneux, Standwell Nkhoma
reference: Bridges DJ, Molyneux M, Nkhoma S. Low level genotypic chloroquine resistance
  near Malawi's northern border with Tanzania. Trop Med Int Health. 2009;14(9):1093-1096.
reference_year: 2009
