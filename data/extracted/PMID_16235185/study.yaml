study_id: PMID_16235185
study_label: pfmdr1 Amplification in Africa (Gabon)
description: Study of pfmdr1 amplification and point mutations in P. falciparum isolates
  from Lambarene, Gabon, collected in 1995 (chemotherapy trial) and 2002 (in vitro
  surveillance). Extractable marker frequencies for pfmdr1 N86Y and pfcrt K76T come
  from the 2002 genotyped subset (n=34).
access_level: public
contributors: Anne-Catrin Uhlemann, Michael Ramharter, Bertrand Lell, Peter G. Kremsner,
  Sanjeev Krishna
reference: Uhlemann AC, Ramharter M, Lell B, Kremsner PG, Krishna S. Amplification
  of Plasmodium falciparum Multidrug Resistance Gene 1 in Isolates from Gabon. J Infect
  Dis 2005;192:1830-5.
reference_year: 2005
