study_id: PMID_16135198
study_label: P. falciparum dhfr/dhps in northern Ghana (Mockenhaupt 2005)
description: Pre-treatment dhfr/dhps genotypes examined in 126 children with uncomplicated
  malaria enrolled in an SP treatment trial in Tamale, Northern Region, Ghana (rainy
  season 2002). Reports mutation frequencies at dhfr codons 51, 59, 108 and dhps codons
  436, 437, 540, 581, 613.
access_level: public
contributors: Mockenhaupt FP, Bousema JT, Eggelte TA, Schreiber J, Ehrhardt S, Wassilew
  N, Otchwemah RN, Sauerwein RW, Bienzle U
reference: Mockenhaupt FP et al. Plasmodium falciparum dhfr but not dhps mutations
  associated with sulphadoxine-pyrimethamine treatment failure and gametocyte carriage
  in northern Ghana. Trop Med Int Health 2005;10(9):901-908.
reference_year: 2005
PMID: '16135198'
