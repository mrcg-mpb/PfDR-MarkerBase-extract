study_id: PMID_19036751
study_label: Mita et al. 2009 - Indigenous evolution of P. falciparum pyrimethamine
  resistance in Africa
description: 'DHFR genotype and flanking microsatellite haplotype analysis of 159
  P. falciparum isolates from Republic of Congo (2006), Ghana (2004) and Kenya (1998).
  Five DHFR genotypes identified based on positions 50, 51, 59, 108, 164: wild-type
  CNCSI, single mutant CNCNI, double mutants CICNI and CNRNI, triple mutant CIRNI.
  Genotype frequencies reported per country in Figure 1.'
access_level: public
contributors: Toshihiro Mita, Kazuyuki Tanabe, Nobuyuki Takahashi, Richard Culleton,
  Mathieu Ndounga, Mawuli Dzodzomenyo, Willis S. Akhwale, Akira Kaneko, Takatoshi
  Kobayakawa
reference: 'Mita T, et al. Indigenous evolution of Plasmodium falciparum pyrimethamine
  resistance multiple times in Africa. J Antimicrob Chemother 2009; 63: 252-255.'
reference_year: 2009
