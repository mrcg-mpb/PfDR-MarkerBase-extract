name: Extraction

# Stage 2. Manual dispatch for now (it bills the API and is the heavier stage).
# Extracts ELIGIBLE papers into STAVE format, validated by the real STAVE package.
on:
  workflow_dispatch:
    inputs:
      max_per_run:
        description: "Max papers to extract this run"
        default: "10"
      model:
        description: "Model (haiku/sonnet/opus)"
        default: "opus"

permissions:
  contents: write

concurrency:
  group: extraction
  cancel-in-progress: false

jobs:
  extraction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      # R + the STAVE guardrail. use-public-rspm pulls CRAN deps as fast binaries.
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install STAVE + variantstring
        # GITHUB_PAT lets remotes authenticate to the GitHub API (otherwise the
        # unauthenticated rate limit blocks install_github with "cannot open URL").
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e 'install.packages(c("remotes","yaml","dplyr","lubridate","R6","stringr","tidyr"))'
          Rscript -e 'remotes::install_github("mrc-ide/variantstring@v1.8.7", upgrade="never")'
          Rscript -e 'remotes::install_github("mrc-ide/STAVE@v2.0.4", upgrade="never")'

      - name: Write service-account key
        run: printf '%s' "$DRIVE_SA_KEY" > "$RUNNER_TEMP/key.json"
        env:
          DRIVE_SA_KEY: ${{ secrets.DRIVE_SA_KEY }}

      - name: Run extraction
        run: python src/run_extraction.py
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/key.json
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          DRIVE_SUPPLEMENT_FOLDER_ID: ${{ secrets.DRIVE_SUPPLEMENT_FOLDER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXTRACT_MODEL: ${{ inputs.model }}
          EXTRACT_MAX_PER_RUN: ${{ inputs.max_per_run }}

      - name: Commit extracted data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/roster.csv data/extracted docs/stats.svg
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Extract studies"
          git pull --rebase --autostash
          git push
