study_id: PMID_9391510
study_label: Jelinek 1997 Magoda DHFR
description: Therapeutic/molecular study of 44 P. falciparum-infected children in
  Magoda village, Tanga region, north-east Tanzania (collected 1995). DHFR codons
  51, 59, 108 (and 16, 164) genotyped by nested PCR-RFLP before treatment with sulfadoxine-pyrimethamine.
  Table 1 gives haplotype-pattern counts.
access_level: public
contributors: T. Jelinek, A. M. Rønn, J. Curtis, M.T. Duraisingh, M. M. Lemnge, J.
  Mhina, I. C. Bygbjerg, D. C. Warhurst
reference: Jelinek T, et al. High prevalence of mutations in the dihydrofolate reductase
  gene of Plasmodium falciparum in isolates from Tanzania. Trop Med Int Health. 1997;2(11):1075-1079.
reference_year: 1997
