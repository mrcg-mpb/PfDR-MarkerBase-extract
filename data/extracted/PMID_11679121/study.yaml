study_label: Mockenhaupt et al. 2001 - pfcrt/pfmdr1/pfdhfr in Ghana
description: Retrospective cross-sectional study of 172 parasitaemic pregnant women
  presenting for antenatal care at the District Hospital in Agogo, Ghana (enrolled
  Nov/Dec 1998). PCR-RFLP genotyping of pfcrt codon 76, pfmdr1 codon 86, and pfdhfr
  codon 108.
