study_id: PMID_41379859
study_label: Zeleke et al. 2025 - Northern Ethiopia Pf ART-R
description: Year-long genomic surveillance study of 903 P. falciparum infections
  from Gondar Zuria and Tach Armachiho districts (Amhara, NW Ethiopia), Nov 2022-Oct
  2023, using MIP sequencing targeting drug resistance markers (k13, crt, dhfr, dhps,
  mdr1). Reports per-locus mutation frequencies overall, per district, and per Kebele.
access_level: public
contributors: Ayalew Jejaw Zeleke, Abebe A. Fola, George A. Tollefson, Karamako Niare,
  Alec Leonetti, Om Taropawala, Jacob Marglous, Rebecca Crudale, Bokretsion G. Brhane,
  Ashenafi Assefa, Patience Kiyuka, Jonathan B. Parr, Asrat Hailu, Mulugeta Aemero
  Tegegne, Jeffrey A. Bailey
reference: Zeleke AJ, et al. High prevalence and emerging positive association of
  kelch13 R622I and HRP2-based RDT negativity in Plasmodium falciparum in northern
  Ethiopia. PLoS Pathog. 2025;21(12):e1013771.
reference_year: 2025
