study_id: PMID_16518760
study_label: Francis et al. 2006 Uganda 6-site drug resistance markers
description: Cross-sectional molecular analysis of pretreatment P. falciparum isolates
  from patients enrolled in antimalarial drug-efficacy trials at 6 sites in Uganda
  (Dec 2002-May 2004), reporting per-site frequencies of pfcrt 76, dhfr 51/59/108/164,
  and dhps 437/540 mutations by wild type/mixed/pure mutant.
access_level: public
contributors: Damon Francis, Samuel L. Nsobya, Ambrose Talisuna, Adoke Yeka, Moses
  R. Kamya, Rhoderick Machekano, Christian Dokomajilar, Philip J. Rosenthal, Grant
  Dorsey
reference: Francis D, et al. Geographic Differences in Antimalarial Drug Efficacy
  in Uganda Are Explained by Differences in Endemicity and Not by Known Molecular
  Markers of Drug Resistance. J Infect Dis 2006;193:978-86.
reference_year: 2006
PMID: '16518760'
