study_id: PMID_9395372
study_label: Plowe et al. 1997 – Antifolate resistance mutations in four countries
description: 'Mutation-specific PCR and restriction/sequencing surveys of P. falciparum
  DHFR (51, 59, 108) and DHPS (436, 437, 540, 581, 613) mutations at four sites with
  increasing pyrimethamine-sulfadoxine resistance: Mali, Kenya, Malawi, Bolivia. Prevalences
  read from Figures 2, 3, and 6, with N samples tested indicated per marker per site.'
access_level: public
contributors: Plowe CV, Cortese JF, Djimde A, Nwanyanwu OC, Watkins WM, Winstanley
  PA, Estrada-Franco JG, Mollinedo RE, Avila JC, Cespedes JL, Carter D, Doumbo OK
reference: Plowe CV, et al. Mutations in Plasmodium falciparum Dihydrofolate Reductase
  and Dihydropteroate Synthase and Epidemiologic Patterns of Pyrimethamine-Sulfadoxine
  Use and Resistance. J Infect Dis 1997;176:1590-6.
reference_year: 1997
