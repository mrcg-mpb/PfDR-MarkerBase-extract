study_label: Jelinek et al. 1998 Tanzania DHFR/DHPS
description: Field study in Magoda village, Tanga Region, Tanzania (1995 and 1996)
  reporting DHFR (51,59,108) and DHPS (436,437,540,581,613) codon frequencies in P.
  falciparum isolates from children before (day 0) and after (day 7) sulphadoxine/pyrimethamine
  treatment.
