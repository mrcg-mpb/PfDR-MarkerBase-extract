study_id: PMID_17956498
study_label: SP efficacy and dhfr/dhps markers, Brazzaville 2003
description: In vivo therapeutic efficacy study of sulfadoxine-pyrimethamine monotherapy
  in children 6-59 months with uncomplicated P. falciparum malaria in Makélékélé district,
  Brazzaville, Congo. Pre-treatment isolates genotyped for pfdhfr codons 51, 59, 108,
  164 and pfdhps codons 436, 437, 540, 581, 613.
