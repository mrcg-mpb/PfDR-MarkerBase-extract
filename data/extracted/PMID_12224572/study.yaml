study_id: PMID_12224572
study_label: Molecular epidemiology of malaria in Cameroon. X. Evaluation of pfmdr1
  mutations
description: Study of 64 P. falciparum clinical isolates from Yaounde, Cameroon (Nlongkak
  Catholic missionary dispensary, 1997-2000), evaluating pfmdr1 polymorphisms (codons
  86, 184, 1034, 1042, 1246) and in vitro drug sensitivity. Only pfmdr1 codon 86 (N->Y)
  is a curated target position.
access_level: public
contributors: Leonardo K. Basco, Pascal Ringwald
reference: Basco LK, Ringwald P. Molecular epidemiology of malaria in Cameroon. X.
  Evaluation of pfmdr1 mutations as genetic markers for resistance to amino alcohols
  and artemisinin derivatives. Am J Trop Med Hyg. 2002;66(6):667-671.
reference_year: 2002
PMID: '12224572'
