study_id: PMID_15941416
study_label: Sendagire et al. 2005, Kasangati, Uganda
description: Baseline clinical efficacy study of SP monotherapy for uncomplicated
  P. falciparum malaria at Kasangati Medical Complex, Wakiso district, Uganda (samples
  collected day 0 in year 2000). Molecular resistance markers in dhfr (codons 51,
  59, 108) and dhps (codons 437, 540) genotyped by PCR-RFLP for 118 successfully assayed
  isolates.
access_level: public
contributors: Hakim Sendagire, Daniel Kyabayinze, Gote Swedberg, Fred Kironde
reference: 'Sendagire H, Kyabayinze D, Swedberg G, Kironde F. Plasmodium falciparum:
  higher incidence of molecular resistance markers for sulphadoxine than for pyrimethamine
  in Kasangati, Uganda. Tropical Medicine and International Health. 2005;10(6):537-543.'
reference_year: 2005
